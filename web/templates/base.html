<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>{% block title %}Stock Strategy Analyzer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="container">
            <a href="{{ url_for('index') }}" class="logo">
                📊 Stock Strategy Analyzer
            </a>
            <nav class="nav">
                <a href="{{ url_for('low_hunter') }}" class="nav-link">📉 Low Hunter</a>
                <a href="{{ url_for('high_hunter') }}" class="nav-link">📈 High Hunter</a>
                <form class="search-form" action="{{ url_for('stock_detail', code='') }}" method="GET" id="search-form">
                    <input type="text" class="search-input" placeholder="銘柄コードで検索（例: 1332）" id="stock-search"
                        autocomplete="off">
                    <button type="submit" class="search-btn">検索</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>処理時間: {{ elapsed }}秒</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
